<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prismic Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
    }
    .status { color: #888; text-align: center; padding: 40px; font-size: 14px; }
    .article { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
    h1 { font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 24px; }
    h2 { font-size: 22px; font-weight: 700; margin: 32px 0 12px; }
    h3 { font-size: 18px; font-weight: 600; margin: 24px 0 8px; }
    h4 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
    p { margin: 0 0 12px; }
    strong { font-weight: 700; }
    a { color: #8e44ec; }
    ul, ol { margin: 0 0 12px 20px; }
    li { margin-bottom: 6px; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 14px; margin: 12px 0; }
    code { font-size: 14px; background: #f5f5f5; padding: 2px 4px; border-radius: 3px; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0 20px; font-size: 15px; }
    th { text-align: left; font-weight: 700; padding: 8px 12px; background: #f5f5f5; border: 1px solid #ddd; }
    td { padding: 8px 12px; border: 1px solid #ddd; vertical-align: top; }
    hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    .meta { font-size: 13px; color: #666; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .meta strong { color: #333; }
  </style>
</head>
<body>
  <div id="status" class="status">Waiting for data...</div>
  <div id="content" style="display:none;"></div>
  <script>
    let handled = false;
    window.addEventListener("message", (event) => {
      if (handled) return;
      if (!event.data) return;

      const payload = event.data;

      // Only handle LangSmith messages — they have type "output"/"reference"
      // or contain recognizable output fields
      const output = payload.data || payload;
      if (typeof output !== "object") return;

      const isLangSmith = payload.type === "output" || payload.type === "reference"
        || output.outputDocumentContent || output.targetBrief || output.campaignBrief
        || output.strategyPreview || output.results;
      if (!isLangSmith) return;

      handled = true;

      document.getElementById("status").style.display = "none";
      const el = document.getElementById("content");
      el.style.display = "block";

      try {
        // ContentWriterAgent: render slices as readable text
        if (output.outputDocumentContent) {
          el.innerHTML = renderDoc(output);
          return;
        }
        // Strategy Agent: render markdown brief
        if (output.targetBrief || output.campaignBrief || output.strategyPreview) {
          el.innerHTML = renderStrategy(output);
          return;
        }
        // Batch: list results
        if (output.results) {
          el.innerHTML = renderBatch(output);
          return;
        }
        // Unknown: dump JSON
        el.innerHTML = `<div class="article"><pre>${esc(JSON.stringify(output, null, 2).slice(0, 10000))}</pre></div>`;
      } catch (e) {
        el.innerHTML = `<div class="article"><p style="color:red">${esc(e.message)}</p></div>`;
      }
    });

    function renderDoc(output) {
      const doc = output.outputDocumentContent;
      const slices = doc.slices?.value || [];
      let html = '<div class="article">';

      // Title from hero or doc-level
      const hero = slices.find(s => s.name === "hero");
      const title = txt(doc.title) || (hero && txt(hero.widget?.primary?.title)) || "";
      if (title) html += `<h1>${esc(title)}</h1>`;

      // Meta
      const uid = doc.uid?.value || "";
      const metaTitle = fieldVal(doc.meta_title);
      const metaDesc = fieldVal(doc.meta_description);
      if (uid || metaTitle || metaDesc) {
        html += '<div class="meta">';
        if (uid) html += `<div><strong>Slug:</strong> /${esc(uid)}</div>`;
        if (metaTitle) html += `<div><strong>Meta title:</strong> ${esc(metaTitle)}</div>`;
        if (metaDesc) html += `<div><strong>Meta description:</strong> ${esc(metaDesc)}</div>`;
        html += '</div>';
      }

      // Render each slice
      for (const slice of slices) {
        html += renderSlice(slice);
      }

      html += '</div>';
      return html;
    }

    function renderSlice(slice) {
      const name = slice.name || "";
      const p = slice.widget?.primary || {};
      const items = slice.widget?.items || [];

      // Skip hero (title already rendered) and toc
      if (name === "hero" || name === "table_of_contents") return "";

      let html = "";

      // Title
      if (p.title) html += richText(p.title);

      // Description / text / content
      if (p.description) html += richText(p.description);
      if (p.text) html += richText(p.text);
      if (p.content) html += richText(p.content);

      // Items as table if they have 2+ fields, otherwise as list
      if (items.length > 0) {
        const fields = itemFields(items[0]);
        if (fields.length === 2) {
          html += '<table><tbody>';
          for (const item of items) {
            const vals = itemMap(item);
            html += `<tr><td><strong>${esc(fieldVal(vals[fields[0]]) || txt(vals[fields[0]]))}</strong></td>`;
            html += `<td>${fieldVal(vals[fields[1]]) || richTextInline(vals[fields[1]])}</td></tr>`;
          }
          html += '</tbody></table>';
        } else {
          for (const item of items) {
            const vals = itemMap(item);
            for (const f of fields) {
              if (vals[f]) {
                const v = vals[f];
                if (v?.__TYPE__ === "StructuredTextContent") html += richText(v);
                else if (v?.__TYPE__ === "FieldContent" && v.value) html += `<p>${esc(v.value)}</p>`;
              }
            }
          }
        }
      }

      return html;
    }

    function renderStrategy(output) {
      const brief = output.targetBrief?.brief || output.campaignBrief?.campaignContext || output.strategyPreview || "";
      let html = '<div class="article">';
      const kw = output.targetRecord?.keyword || "";
      if (kw) html += `<h1>${esc(kw)}</h1>`;
      html += md(brief);
      html += '</div>';
      return html;
    }

    function renderBatch(output) {
      let html = '<div class="article">';
      html += `<h1>${esc(output.releaseName || "Batch")}</h1>`;
      html += `<p>${output.successCount || 0} success, ${output.errorCount || 0} errors</p>`;
      for (const r of (output.results || [])) {
        html += `<p><strong>${esc(r.keyword || r.documentId || "")}</strong> (${r.changesCount || 0} changes, ${esc(r.status || "")})</p>`;
      }
      html += '</div>';
      return html;
    }

    // --- Helpers ---

    function richText(field) {
      if (!field?.value) return "";
      let html = "";
      let listTag = null;
      for (const block of field.value) {
        const text = block.content?.text || "";
        const type = block.type || block.content?.type || "paragraph";
        const spans = block.content?.spans || [];
        const r = applySpans(text, spans);
        if (type === "list-item") {
          if (listTag !== "ul") { if (listTag) html += `</${listTag}>`; html += "<ul>"; listTag = "ul"; }
          html += `<li>${r}</li>`; continue;
        } else if (type === "o-list-item") {
          if (listTag !== "ol") { if (listTag) html += `</${listTag}>`; html += "<ol>"; listTag = "ol"; }
          html += `<li>${r}</li>`; continue;
        }
        if (listTag) { html += `</${listTag}>`; listTag = null; }
        if (type === "heading1") html += `<h1>${r}</h1>`;
        else if (type === "heading2") html += `<h2>${r}</h2>`;
        else if (type === "heading3") html += `<h3>${r}</h3>`;
        else if (type === "heading4") html += `<h4>${r}</h4>`;
        else if (type === "preformatted") html += `<pre>${r}</pre>`;
        else if (text) html += `<p>${r}</p>`;
      }
      if (listTag) html += `</${listTag}>`;
      return html;
    }

    function richTextInline(field) {
      if (!field?.value) return "";
      return field.value.map(b => esc(b.content?.text || "")).join(" ");
    }

    function applySpans(text, spans) {
      if (!spans?.length) return esc(text);
      const sorted = [...spans].sort((a, b) => a.start - b.start);
      let result = "", pos = 0;
      for (const s of sorted) {
        if (s.start > pos) result += esc(text.slice(pos, s.start));
        const inner = esc(text.slice(s.start, s.end));
        if (s.type === "strong") result += `<strong>${inner}</strong>`;
        else if (s.type === "em") result += `<em>${inner}</em>`;
        else if (s.type === "hyperlink") result += `<a href="${esc(s.data?.url || "#")}">${inner}</a>`;
        else result += inner;
        pos = s.end;
      }
      if (pos < text.length) result += esc(text.slice(pos));
      return result;
    }

    function txt(field) {
      if (!field) return "";
      if (typeof field === "string") return field;
      if (field.value && Array.isArray(field.value))
        return field.value.map(b => b.content?.text || "").join(" ");
      if (typeof field.value === "string") return field.value;
      return "";
    }

    function fieldVal(field) {
      if (!field) return "";
      if (typeof field === "string") return field;
      if (field.__TYPE__ === "FieldContent") return field.value || "";
      if (field.__TYPE__ === "StructuredTextContent") return txt(field);
      if (field.__TYPE__ === "UIDContent") return field.value || "";
      if (typeof field.value === "string") return field.value;
      return "";
    }

    function itemMap(item) {
      const m = {};
      for (const e of (item.value || [])) {
        if (Array.isArray(e) && e.length === 2) m[e[0]] = e[1];
      }
      return m;
    }

    function itemFields(item) {
      return (item.value || []).filter(e => Array.isArray(e) && e.length === 2).map(e => e[0]);
    }

    function md(text) {
      if (!text) return "";
      let h = esc(text);
      h = h.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
      h = h.replace(/^### (.+)$/gm, "<h3>$1</h3>");
      h = h.replace(/^## (.+)$/gm, "<h2>$1</h2>");
      h = h.replace(/^# (.+)$/gm, "<h1>$1</h1>");
      h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");
      h = h.replace(/^---$/gm, "<hr>");
      h = h.replace(/^- (.+)$/gm, "<li>$1</li>");
      h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
      h = h.replace(/\n\n/g, "</p><p>");
      h = `<p>${h}</p>`;
      h = h.replace(/<p>\s*<\/p>/g, "");
      h = h.replace(/<p>\s*(<(?:h[1-4]|hr|ul|ol)>)/g, "$1");
      h = h.replace(/(<\/(?:h[1-4]|hr|ul|ol)>)\s*<\/p>/g, "$1");
      return h;
    }

    function esc(s) {
      if (!s) return "";
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }
  </script>
</body>
</html>
