<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prismic Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status { color: #888; font-size: 14px; text-align: center; }
    .error { color: #dc2626; }
    a { color: #5E6AD2; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .links { margin-top: 12px; display: flex; gap: 16px; justify-content: center; font-size: 12px; }
  </style>
</head>
<body>
  <div id="status" class="status">Waiting for data from LangSmith...</div>

  <script>
    const PRISMIC_TOKEN = "MC5hS1dudGhJQUFDa0F6bFQ2.Je-_ve-_vSpFbO-_ve-_vX7vv71BA--_ve-_vQE0Ae-_ve-_vToZ77-9Te-_ve-_ve-_vTtN77-9TO-_vSc";
    const WEBSITE_PREVIEW_ID = "Y9Ds8xEAACYAvTuU";

    let handled = false;

    window.addEventListener("message", async (event) => {
      if (handled) return;
      if (!event.data || !event.data.type) return;

      const { type, data, metadata } = event.data;
      if (type !== "output" && type !== "reference") return;
      handled = true;

      const output = data || {};
      const inputs = (metadata && metadata.inputs) || {};

      const repo = output.repositoryId || inputs.repositoryId || "prismic-main";
      const releaseId = output.releaseId || inputs.releaseId;
      const pageVariant = output.pageVariant || {};
      const docId = pageVariant.documentId;

      if (!docId) {
        showError("No document ID found in trace output.", output);
        return;
      }

      setStatus("Resolving preview URL...");

      try {
        const ref = await resolveRef(repo, releaseId);
        if (!ref) {
          showFallback(repo, docId, releaseId, "Could not resolve Prismic ref.");
          return;
        }

        const tokenUrl = `https://${repo}.prismic.io/previews/${ref}?websitePreviewId=${WEBSITE_PREVIEW_ID}`;
        const previewUrl = `https://prismic.io/api/preview?token=${encodeURIComponent(tokenUrl)}&documentId=${docId}`;

        // Redirect the iframe to the Prismic preview
        window.location.href = previewUrl;
      } catch (e) {
        showFallback(repo, docId, releaseId, e.message);
      }
    });

    async function resolveRef(repo, releaseId) {
      const apiUrl = `https://${repo}.cdn.prismic.io/api/v2?access_token=${encodeURIComponent(PRISMIC_TOKEN)}`;
      const res = await fetch(apiUrl);
      if (!res.ok) return null;
      const data = await res.json();

      if (releaseId) {
        const release = data.refs.find((r) => r.id === releaseId);
        if (release) return release.ref;
      }

      // Fallback to master ref (published content)
      const master = data.refs.find((r) => r.isMasterRef);
      return master ? master.ref : null;
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function showError(msg, data) {
      const el = document.getElementById("status");
      el.className = "status error";
      el.innerHTML = escapeHtml(msg);
      if (data) {
        el.innerHTML += `<pre style="text-align:left;background:#f7f7f8;padding:10px;border-radius:6px;font-size:11px;margin-top:10px;max-height:60vh;overflow:auto;white-space:pre-wrap;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
      }
    }

    function showFallback(repo, docId, releaseId, reason) {
      const el = document.getElementById("status");
      const builderUrl = `https://${repo}.prismic.io/builder/pages/${docId}${releaseId ? `?s=release&r=${releaseId}` : "?s=published"}`;
      el.innerHTML = `<div>${escapeHtml(reason)}</div>
        <div class="links">
          <a href="${builderUrl}" target="_blank">Open in Prismic Builder</a>
        </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
