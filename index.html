<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prismic Preview</title>
  <style>
    @font-face {
      font-family: "Satoshi";
      src: url("https://prismic.io/_next/static/media/Satoshi_Variable-s.p.fc536e90.woff2") format("woff2");
      font-weight: 100 900;
      font-display: swap;
    }
    @font-face {
      font-family: "Rational Display";
      src: url("https://prismic.io/_next/static/media/rationaldisplay_medium_webfont-s.p.cae8b627.woff2") format("woff2");
      font-weight: 500;
      font-display: swap;
    }
    @font-face {
      font-family: "Rational Display";
      src: url("https://prismic.io/_next/static/media/rationaldisplay_semibold_webfont-s.p.622c2a5d.woff2") format("woff2");
      font-weight: 600;
      font-display: swap;
    }
    @font-face {
      font-family: "IBM Plex Mono";
      src: url("https://prismic.io/_next/static/media/IBMPlexMono_Medium-s.p.dff3e4b1.woff2") format("woff2");
      font-weight: 500;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Satoshi", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Loading / status (centered) */
    .status {
      color: #505050;
      text-align: center;
      padding: 40px;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .error { color: #f97289; }
    .status a { color: #8e44ec; text-decoration: none; font-weight: 600; }
    .status a:hover { text-decoration: underline; }
    .links { margin-top: 12px; display: flex; gap: 16px; justify-content: center; font-size: 12px; }

    /* Article container */
    .article {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Meta header */
    .meta-bar {
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid #eee;
    }
    .meta-bar h1 {
      font-family: "Rational Display", "Satoshi", sans-serif;
      font-size: 36px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #151515;
      margin-bottom: 16px;
    }
    .meta-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: #f5e6ff;
      color: #8e44ec;
    }
    .chip.slug {
      background: #e8f8f3;
      color: #3bbb96;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 500;
    }
    .meta-detail {
      font-size: 13px;
      color: #505050;
      line-height: 1.5;
      margin-top: 6px;
    }
    .meta-detail strong {
      color: #151515;
      font-weight: 600;
    }

    /* Headings */
    h2 {
      font-family: "Rational Display", "Satoshi", sans-serif;
      font-size: 26px;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: #151515;
      margin: 40px 0 16px;
    }
    h3 {
      font-family: "Rational Display", "Satoshi", sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 1.35;
      color: #151515;
      margin: 32px 0 12px;
    }
    h4 {
      font-family: "Satoshi", sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #151515;
      margin: 24px 0 8px;
    }

    /* Body text */
    p { margin-bottom: 16px; color: #303030; }
    strong { font-weight: 700; color: #151515; }
    em { font-style: italic; }
    a { color: #8e44ec; text-decoration: underline; text-underline-offset: 2px; }
    a:hover { color: #b382f2; }

    /* Lists */
    ul, ol { margin: 0 0 16px 20px; color: #303030; }
    li { margin-bottom: 8px; padding-left: 4px; }
    li::marker { color: #8e44ec; }

    /* Code */
    pre {
      background: #151515;
      color: #f7f7f7;
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      padding: 20px 24px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 16px 0 24px;
      line-height: 1.6;
    }
    code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 14px;
      background: #f7f7f7;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Slices */
    .slice { margin-bottom: 8px; }
    .slice-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #acacac;
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* TL;DR */
    .tldr {
      background: #f5e6ff;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 32px;
    }
    .tldr h2 { font-size: 20px; margin: 0 0 12px; color: #8e44ec; }
    .tldr ul { margin-bottom: 0; }
    .tldr li { color: #303030; }
    .tldr li::marker { color: #8e44ec; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 16px 0 28px;
      font-size: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
    }
    th {
      text-align: left;
      font-weight: 700;
      font-size: 13px;
      padding: 12px 16px;
      background: #151515;
      color: #fff;
      border-bottom: 1px solid #303030;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #f7f7f7;
      vertical-align: top;
      color: #303030;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #faf8ff; }

    /* FAQ */
    .faq-item {
      margin-bottom: 20px;
      padding: 20px 24px;
      background: #f7f7f7;
      border-radius: 12px;
    }
    .faq-item h3 { margin: 0 0 8px; font-size: 17px; color: #151515; }
    .faq-item p { margin-bottom: 0; color: #505050; font-size: 15px; }
    .faq-item p + p { margin-top: 8px; }

    /* Batch summary */
    .batch-card {
      background: #f7f7f7;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    .batch-card h2 { margin: 0 0 4px; font-size: 18px; }
    .batch-card .meta-detail { margin-top: 0; }
  </style>
</head>
<body>
  <div id="status" class="status">Waiting for data from LangSmith...</div>
  <div id="content" style="display:none;"></div>

  <script>
    const PRISMIC_TOKEN = "MC5hS1dudGhJQUFDa0F6bFQ2.Je-_ve-_vSpFbO-_ve-_vX7vv71BA--_ve-_vQE0Ae-_ve-_vToZ77-9Te-_ve-_ve-_vTtN77-9TO-_vSc";
    const WEBSITE_PREVIEW_ID = "Y9Ds8xEAACYAvTuU";

    let handled = false;

    window.addEventListener("message", async (event) => {
      if (handled) return;
      if (!event.data) return;

      // LangSmith sends {type, data, metadata} but some contexts send raw data
      const payload = event.data;
      const type = payload.type;
      if (type && type !== "output" && type !== "reference") return;
      handled = true;

      const output = payload.data || payload || {};
      const inputs = (payload.metadata && payload.metadata.inputs) || {};

      // Extract documentId + repo + releaseId from any trace type
      const repo = output.repositoryId || inputs.repositoryId || "prismic-main";
      const releaseId = output.releaseId || inputs.releaseId;

      // PersonalizationAgent: pageVariant.documentId
      // batchProcessGraph: results[0].documentId
      // ContentWriterAgent: no direct docId — fall back to inline render
      const docId =
        output.pageVariant?.documentId ||
        (output.results && output.results[0]?.documentId) ||
        null;

      // Batch traces: show summary with links (don't auto-redirect)
      if (output.results && output.results.length > 0) {
        renderBatchSummary(output, repo, releaseId);
        return;
      }

      // Single document with documentId: redirect to Prismic preview
      if (docId) {
        await redirectToPreview(repo, docId, releaseId);
        return;
      }

      // ContentWriterAgent: inline content rendering
      if (output.outputDocumentContent) {
        renderContent(output);
        return;
      }

      // Strategy Agent traces
      if (output.campaignBrief || output.targetBrief || output.strategyPreview) {
        renderStrategyOutput(output);
        return;
      }

      showError("Unrecognised trace output.", output);

    });

    async function redirectToPreview(repo, docId, releaseId) {
      setStatus("Resolving preview URL...");
      try {
        const ref = await resolveRef(repo, releaseId);
        if (!ref) {
          showFallback(repo, docId, releaseId, "Could not resolve Prismic ref.");
          return;
        }
        const tokenUrl = `https://${repo}.prismic.io/previews/${ref}?websitePreviewId=${WEBSITE_PREVIEW_ID}`;
        const previewUrl = `https://prismic.io/api/preview?token=${encodeURIComponent(tokenUrl)}&documentId=${docId}`;
        window.location.href = previewUrl;
      } catch (e) {
        showFallback(repo, docId, releaseId, e.message);
      }
    }

    // --- Prismic preview helpers ---

    async function resolveRef(repo, releaseId) {
      const apiUrl = `https://${repo}.cdn.prismic.io/api/v2?access_token=${encodeURIComponent(PRISMIC_TOKEN)}`;
      const res = await fetch(apiUrl);
      if (!res.ok) return null;
      const data = await res.json();
      if (releaseId) {
        const release = data.refs.find((r) => r.id === releaseId);
        if (release) return release.ref;
      }
      const master = data.refs.find((r) => r.isMasterRef);
      return master ? master.ref : null;
    }

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function showError(msg, data) {
      const el = document.getElementById("status");
      el.className = "status error";
      el.innerHTML = esc(msg);
      if (data) {
        el.innerHTML += `<pre style="text-align:left;background:#f7f7f7;padding:16px;border-radius:12px;font-size:12px;font-family:'IBM Plex Mono',monospace;margin-top:12px;max-height:60vh;overflow:auto;white-space:pre-wrap;">${esc(JSON.stringify(data, null, 2))}</pre>`;
      }
    }

    function showFallback(repo, docId, releaseId, reason) {
      const el = document.getElementById("status");
      const builderUrl = `https://${repo}.prismic.io/builder/pages/${docId}${releaseId ? `?s=release&r=${releaseId}` : "?s=published"}`;
      el.innerHTML = `<div>${esc(reason)}</div>
        <div class="links">
          <a href="${builderUrl}" target="_blank">Open in Prismic Builder</a>
        </div>`;
    }

    // --- Content rendering ---

    function renderContent(outputs) {
      const doc = outputs.outputDocumentContent;
      document.getElementById("status").style.display = "none";
      const el = document.getElementById("content");
      el.style.display = "block";

      // Title: try doc.title, then extract from first hero slice
      let title = extractText(doc.title);
      if (!title) {
        const heroSlice = (doc.slices?.value || []).find(s => s.name === "hero");
        if (heroSlice) title = extractText(heroSlice.widget?.primary?.title);
      }
      const metaTitle = extractFieldValue(doc.meta_title);
      const metaDesc = extractFieldValue(doc.meta_description);
      const uid = extractFieldValue(doc.uid) || doc.uid?.value || "";
      const customType = extractFieldValue(doc.customType) || outputs.customType?.label || outputs.customType?.id || "";

      let html = `<div class="article"><div class="meta-bar">`;
      html += `<h1>${esc(title)}</h1>`;
      html += `<div class="meta-chips">`;
      if (customType) html += `<span class="chip">${esc(customType)}</span>`;
      if (uid) html += `<span class="chip slug">/${esc(uid)}</span>`;
      html += `</div>`;
      if (metaTitle) html += `<div class="meta-detail"><strong>Meta title:</strong> ${esc(metaTitle)}</div>`;
      if (metaDesc) html += `<div class="meta-detail"><strong>Meta description:</strong> ${esc(metaDesc)}</div>`;
      html += `</div>`;

      for (const slice of (doc.slices?.value || [])) {
        html += renderSlice(slice);
      }

      html += `</div>`;
      el.innerHTML = html;
    }

    function renderBatchSummary(outputs, repo, releaseId) {
      document.getElementById("status").style.display = "none";
      const el = document.getElementById("content");
      el.style.display = "block";

      let html = `<div class="article"><div class="meta-bar">`;
      html += `<h1>${esc(outputs.releaseName || "Batch Process")}</h1>`;
      html += `<div class="meta-chips">`;
      html += `<span class="chip">${esc(outputs.repositoryId || "")}</span>`;
      html += `<span class="chip slug">${outputs.successCount || 0} success · ${outputs.errorCount || 0} errors</span>`;
      html += `</div></div>`;

      for (const r of (outputs.results || [])) {
        const docId = r.documentId || "";
        const builderUrl = repo && docId
          ? `https://${esc(repo)}.prismic.io/builder/pages/${esc(docId)}${releaseId ? `?s=release&r=${esc(releaseId)}` : "?s=published"}`
          : "";
        html += `<div class="batch-card">`;
        html += `<h2>${builderUrl ? `<a href="${builderUrl}" target="_blank">` : ""}${esc(r.keyword || r.title || r.documentId || "Untitled")}${builderUrl ? "</a>" : ""}</h2>`;
        html += `<div class="meta-detail">${esc(r.customTypeId || "")} · ${r.changesCount || 0} changes · ${esc(r.status || "")}</div>`;
        html += `</div>`;
      }

      html += `</div>`;
      el.innerHTML = html;
    }

    function renderStrategyOutput(output) {
      document.getElementById("status").style.display = "none";
      const el = document.getElementById("content");
      el.style.display = "block";

      const brief = output.targetBrief?.brief || output.campaignBrief?.campaignContext || "";
      const keyword = output.targetRecord?.keyword || "";
      const preview = output.strategyPreview || "";

      let html = `<div class="article"><div class="meta-bar">`;
      html += `<h1>${esc(keyword || "Strategy Output")}</h1>`;
      if (preview) html += `<div class="meta-detail">${esc(preview).replace(/\n/g, "<br>")}</div>`;
      html += `</div>`;
      if (brief) html += renderMarkdown(brief);
      html += `</div>`;
      el.innerHTML = html;
    }

    function renderMarkdown(text) {
      if (!text) return "";
      let h = esc(text);
      h = h.replace(/^#### (.+)$/gm, "<h4>$1</h4>");
      h = h.replace(/^### (.+)$/gm, "<h3>$1</h3>");
      h = h.replace(/^## (.+)$/gm, "<h2>$1</h2>");
      h = h.replace(/^# (.+)$/gm, "<h1>$1</h1>");
      h = h.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      h = h.replace(/\*(.+?)\*/g, "<em>$1</em>");
      h = h.replace(/^---$/gm, "<hr>");
      h = h.replace(/^- (.+)$/gm, "<li>$1</li>");
      h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
      h = h.replace(/\n\n/g, "</p><p>");
      h = `<p>${h}</p>`;
      h = h.replace(/<p>\s*<\/p>/g, "");
      h = h.replace(/<p>\s*(<(?:h[1-4]|hr|ul|ol)>)/g, "$1");
      h = h.replace(/(<\/(?:h[1-4]|hr|ul|ol)>)\s*<\/p>/g, "$1");
      return h;
    }

    function renderSlice(slice) {
      const name = slice.name || "unknown";
      const widget = slice.widget || {};
      const primary = widget.primary || {};
      const items = widget.items || [];

      let html = `<div class="slice">`;

      if (name === "tldr") {
        html += `<div class="tldr">`;
        html += renderRichText(primary.title);
        html += renderRichText(primary.content);
        html += `</div>`;
      } else if (name === "text_content" || name === "text") {
        // Detect TL;DR / Key Takeaways by title text
        const titleText = extractText(primary.title).toLowerCase();
        if (titleText.includes("takeaway") || titleText.includes("tl;dr") || titleText.includes("tldr")) {
          html += `<div class="tldr">`;
          html += renderRichText(primary.title);
          html += renderRichText(primary.content);
          html += `</div>`;
        } else {
          html += renderRichText(primary.title);
          html += renderRichText(primary.content);
        }
      } else if (name === "comparison_table") {
        html += renderComparisonTable(primary, items);
      } else if (name === "faq" || name === "accordion") {
        html += renderRichText(primary.title);
        if (primary.description) html += renderRichText(primary.description);
        html += renderItemList(items, name === "faq" ? ["question","answer"] : ["title","description"]);
      } else if (name === "hero") {
        // Skip hero — title already extracted for meta-bar
        if (primary.text) html += renderRichText(primary.text);
      } else if (name === "feature_grid") {
        html += renderRichText(primary.title);
        if (primary.description) html += renderRichText(primary.description);
        html += renderItemList(items, ["title","description"]);
      } else if (name === "pricing_table") {
        html += renderPricingTable(primary, items);
      } else if (name === "step_boxes") {
        html += renderRichText(primary.title);
        if (primary.description) html += renderRichText(primary.description);
        html += renderSteps(items);
      } else if (name === "table_of_contents") {
        // Skip — TOC is navigation, not content
      } else if (name === "form") {
        html += renderRichText(primary.title);
        if (primary.description) html += renderRichText(primary.description);
      } else {
        html += `<div class="slice-label">${esc(name)}</div>`;
        // Render fields in semantic order: title/heading first, then description, then content, then rest
        const fieldOrder = ["pre_title", "title", "heading", "subtitle", "description", "text", "content"];
        const orderedKeys = Object.keys(primary).sort((a, b) => {
          const ai = fieldOrder.indexOf(a);
          const bi = fieldOrder.indexOf(b);
          if (ai !== -1 && bi !== -1) return ai - bi;
          if (ai !== -1) return -1;
          if (bi !== -1) return 1;
          return 0;
        });
        for (const key of orderedKeys) {
          const val = primary[key];
          if (val?.__TYPE__ === "StructuredTextContent") html += renderRichText(val);
          else if (val?.__TYPE__ === "FieldContent" && val.value) html += `<p>${esc(val.value)}</p>`;
        }
      }

      html += `</div>`;
      return html;
    }

    function renderItemList(items, fieldNames) {
      let html = "";
      const [titleField, bodyField] = fieldNames;
      for (const item of items) {
        const vals = itemToMap(item);
        html += `<div class="faq-item">`;
        if (vals[titleField]) html += renderRichText(vals[titleField]);
        if (vals[bodyField]) html += renderRichText(vals[bodyField]);
        html += `</div>`;
      }
      return html;
    }

    function renderPricingTable(primary, items) {
      let html = "";
      html += renderRichText(primary.title);
      if (primary.description) html += renderRichText(primary.description);

      if (items.length === 0) return html;

      // Detect item field names from first item
      const firstVals = itemToMap(items[0]);
      const itemKeys = Object.keys(firstVals);

      // Simple two-column table: title/label + explanation/description/text
      const labelKey = itemKeys.find(k => k === "title" || k === "label" || k === "sub_heading") || itemKeys[0];
      const bodyKey = itemKeys.find(k => k === "explanation" || k === "description" || k === "text" || k === "content") || itemKeys[1];

      html += `<table><tbody>`;
      for (const item of items) {
        const vals = itemToMap(item);
        const label = extractFieldValue(vals[labelKey]) || extractText(vals[labelKey]) || "";
        const body = vals[bodyKey];
        html += `<tr><td><strong>${esc(label)}</strong></td>`;
        html += `<td>${body ? renderRichTextInline(body) : ""}</td></tr>`;
      }
      html += `</tbody></table>`;
      return html;
    }

    function renderSteps(items) {
      let html = `<ol>`;
      for (const item of items) {
        const vals = itemToMap(item);
        const title = extractFieldValue(vals.title) || extractText(vals.title) || "";
        const text = vals.text || vals.description;
        html += `<li><strong>${esc(title)}</strong>`;
        if (text) html += `<br>${renderRichTextInline(text)}`;
        html += `</li>`;
      }
      html += `</ol>`;
      return html;
    }

    function renderComparisonTable(primary, items) {
      const cols = [];
      for (const key of Object.keys(primary).sort()) {
        if (key.startsWith("category_") || key === "title") {
          const val = primary[key];
          cols.push({ key, label: extractFieldValue(val) || extractText(val) || key });
        }
      }

      let html = "";
      const titleCol = cols.find(c => c.key === "title");
      if (titleCol) html += `<h3>${esc(titleCol.label)}</h3>`;

      const dataCols = cols.filter(c => c.key !== "title");
      if (items.length === 0) return html;

      html += `<table><thead><tr><th></th>`;
      for (const col of dataCols) html += `<th>${esc(col.label)}</th>`;
      html += `</tr></thead><tbody>`;

      for (const item of items) {
        const vals = itemToMap(item);
        html += `<tr><td><strong>${esc(extractFieldValue(vals.sub_heading) || "")}</strong></td>`;
        for (let i = 0; i < dataCols.length; i++) {
          const cell = vals[`text_${dataCols[i].key}`];
          html += `<td>${cell ? renderRichTextInline(cell) : ""}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table>`;
      return html;
    }

    function renderFaq(items) {
      let html = "";
      for (const item of items) {
        const vals = itemToMap(item);
        html += `<div class="faq-item">`;
        if (vals.question) html += renderRichText(vals.question);
        if (vals.answer) html += renderRichText(vals.answer);
        html += `</div>`;
      }
      return html;
    }

    function itemToMap(item) {
      const map = {};
      for (const entry of (item.value || [])) {
        if (Array.isArray(entry) && entry.length === 2) map[entry[0]] = entry[1];
      }
      return map;
    }

    function renderRichText(field) {
      if (!field || !field.value) return "";
      let html = "";
      let listTag = null; // "ul" or "ol"

      for (const block of field.value) {
        const text = block.content?.text || "";
        const type = block.type || block.content?.type || "paragraph";
        const spans = block.content?.spans || [];
        const rendered = applySpans(text, spans);

        if (type === "list-item") {
          if (listTag !== "ul") { if (listTag) html += `</${listTag}>`; html += "<ul>"; listTag = "ul"; }
          html += `<li>${rendered}</li>`;
          continue;
        } else if (type === "o-list-item") {
          if (listTag !== "ol") { if (listTag) html += `</${listTag}>`; html += "<ol>"; listTag = "ol"; }
          html += `<li>${rendered}</li>`;
          continue;
        }

        if (listTag) { html += `</${listTag}>`; listTag = null; }

        if (type === "heading1") html += `<h1>${rendered}</h1>`;
        else if (type === "heading2") html += `<h2>${rendered}</h2>`;
        else if (type === "heading3") html += `<h3>${rendered}</h3>`;
        else if (type === "heading4") html += `<h4>${rendered}</h4>`;
        else if (type === "preformatted") html += `<pre>${rendered}</pre>`;
        else if (text) html += `<p>${rendered}</p>`;
      }

      if (listTag) html += `</${listTag}>`;
      return html;
    }

    function renderRichTextInline(field) {
      if (!field || !field.value) return "";
      return field.value.map(b => esc(b.content?.text || "")).join(" ");
    }

    function applySpans(text, spans) {
      if (!spans || spans.length === 0) return esc(text);
      const sorted = [...spans].sort((a, b) => a.start - b.start);
      let result = "";
      let pos = 0;
      for (const span of sorted) {
        if (span.start > pos) result += esc(text.slice(pos, span.start));
        const inner = esc(text.slice(span.start, span.end));
        if (span.type === "strong") result += `<strong>${inner}</strong>`;
        else if (span.type === "em") result += `<em>${inner}</em>`;
        else if (span.type === "hyperlink") result += `<a href="${esc(span.data?.url || "#")}" target="_blank">${inner}</a>`;
        else result += inner;
        pos = span.end;
      }
      if (pos < text.length) result += esc(text.slice(pos));
      return result;
    }

    function extractText(field) {
      if (!field) return "";
      if (typeof field === "string") return field;
      if (field.value && Array.isArray(field.value))
        return field.value.map(b => b.content?.text || "").join(" ");
      if (field.value && typeof field.value === "string") return field.value;
      return "";
    }

    function extractFieldValue(field) {
      if (!field) return "";
      if (typeof field === "string") return field;
      if (field.__TYPE__ === "FieldContent") return field.value || "";
      if (field.__TYPE__ === "StructuredTextContent") return extractText(field);
      if (field.value) return typeof field.value === "string" ? field.value : "";
      return "";
    }

    function esc(str) {
      if (!str) return "";
      const div = document.createElement("div");
      div.textContent = String(str);
      return div.innerHTML;
    }
  </script>
</body>
</html>
